name: Deploy URL Shortener

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Deploy to AWS
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.get_api_url.outputs.api_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SAM Build
        run: sam build

      - name: SAM Deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Get API URL from CloudFormation outputs
        id: get_api_url
        run: |
          set -euo pipefail

          REGION="${AWS_REGION:-${{ secrets.AWS_REGION }}}"
          STACK_NAME="url-shortener"

          echo "Querying stack '$STACK_NAME' in region '$REGION'"

          echo "--- All CloudFormation Outputs ---"
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$REGION" \
            --query "Stacks[0].Outputs" \
            --output json || true

          echo "--- All Output Keys ---"
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$REGION" \
            --query "Stacks[0].Outputs[].OutputKey" \
            --output json || true

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue | [0]" \
            --output text)

          echo "Extracted API_URL: '$API_URL'"

          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "ERROR: ApiUrl output not found in stack '$STACK_NAME'"
            echo "Check that template.yaml Outputs section has 'ApiUrl' defined"
            exit 1
          fi

          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

  smoke-test:
    name: Smoke Test
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Debug — print API URL
        env:
          API_URL: ${{ needs.deploy.outputs.api_url }}
        run: |
          echo "API URL received: '$API_URL'"
          if [ -z "$API_URL" ]; then
            echo "ERROR: api_url output is empty — deploy job may not have set it"
            exit 1
          fi

      - name: Wait for API to be ready
        run: sleep 5

      - name: Test POST /shorten
        id: shorten
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST ${{ needs.deploy.outputs.api_url }}/shorten \
            -H "Content-Type: application/json" \
            -d '{"url": "https://github.com/pranavverma0007"}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n1)

          echo "Response body: $BODY"
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "FAILED: Expected 201, got $HTTP_CODE"
            exit 1
          fi

          SHORT_CODE=$(echo $BODY | python3 -c "import sys, json; print(json.load(sys.stdin)['short_code'])")
          echo "short_code=$SHORT_CODE" >> $GITHUB_OUTPUT
          echo "Extracted short_code: $SHORT_CODE"

      - name: Test GET /{code} redirect
        run: |
          SHORT_CODE=${{ steps.shorten.outputs.short_code }}
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            ${{ needs.deploy.outputs.api_url }}/$SHORT_CODE)

          echo "Redirect HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "302" ]; then
            echo "FAILED: Expected 302, got $HTTP_CODE"
            exit 1
          fi

      - name: Test GET /nonexistent returns 404
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            ${{ needs.deploy.outputs.api_url }}/doesnotexist999)

          echo "404 test HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "404" ]; then
            echo "FAILED: Expected 404, got $HTTP_CODE"
            exit 1
          fi

      - name: All smoke tests passed
        run: echo "Deployment verified — POST, redirect, and 404 all working."